<!DOCTYPE html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Happy Birthday Jan!</title><style>*{margin:0;padding:0;box-sizing:border-box}body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ffafbd,#ffc3a0);font-family:sans-serif;overflow:hidden}.c{text-align:center;z-index:2}.b{padding:18px 35px;font-size:22px;font-weight:bold;border:0;border-radius:40px;background:linear-gradient(45deg,#ff6b6b,#ff8e8e);color:#fff;cursor:pointer;box-shadow:0 8px 25px rgba(0,0,0,.2)}.m{display:none;font-weight:bold;margin-top:20px}.m1{font-size:42px;color:#ff3366;animation:b 2s infinite}.m2{font-size:30px;color:#8a2be2}.m3{font-size:38px;color:red;animation:h 1.5s infinite}@keyframes b{50%{transform:translateY(-15px)}}@keyframes h{50%{transform:scale(1.1)}}.f{position:absolute;bottom:-50px;animation:fl 6s linear infinite}@keyframes fl{to{transform:translateY(-110vh) rotate(360deg);opacity:0}}.ball{position:absolute;width:50px;height:60px;border-radius:50%;bottom:-80px;animation:bl 12s linear infinite}.ball:after{content:"";position:absolute;left:50%;bottom:-40px;width:2px;height:40px;background:#333}@keyframes bl{to{transform:translateY(-120vh) rotate(360deg)}}.fw{position:absolute;width:4px;height:4px;border-radius:50%;animation:ex 1.5s ease-out forwards}@keyframes ex{to{transform:translate(var(--x),var(--y));opacity:0}}</style></head><body><div class=c><button class=b onclick=s()>CLICK ON IT</button><div id=m1 class="m m1">HAPPY BIRTHDAY MERE JAN 💝</div><div id=m2 class="m m2"></div><div id=m3 class="m m3"></div></div><script>function s(){document.querySelector(".b").style.display="none";m1.style.display="block";hearts(30);balls(10);music([392,440,523,494]);setTimeout(()=>{m2.innerHTML="THANKS FOR COMMING IN MY LIFE 💕💕💕💕💕 💖";m2.style.display="block";hearts(20);music([392,494,587,523]);setTimeout(()=>{m3.innerHTML="Many Many Happy Returs of the Day. Always Keep Smilig 💕 FOREVER!";m3.style.display="block";hearts(40);fire();music([523,659,784,880])},4000)},4000)}function hearts(n){let e=["❤️","💖","💕","💘"];for(let i=0;i<n;i++){let d=document.createElement("div");d.className="f";d.innerHTML=e[Math.random()*e.length|0];d.style.left=Math.random()*100+"vw";d.style.fontSize=20+Math.random()*30+"px";d.style.animationDuration=4+Math.random()*3+"s";document.body.appendChild(d)}}function balls(n){let c=["#ff6b6b","#4ecdc4","#feca57","#ff9ff3"];for(let i=0;i<n;i++){let d=document.createElement("div");d.className="ball";d.style.left=Math.random()*100+"vw";d.style.background=c[Math.random()*c.length|0];d.style.animationDelay=Math.random()*5+"s";document.body.appendChild(d)}}function fire(){for(let i=0;i<15;i++){let x=Math.random()*100,y=Math.random()*100;for(let j=0;j<20;j++){let a=6.28*j/20,r=40+Math.random()*60,d=document.createElement("div");d.className="fw";d.style.left=x+"vw";d.style.top=y+"vh";d.style.background="hsl("+Math.random()*360+",100%,50%)";d.style.setProperty("--x",Math.cos(a)*r+"px");d.style.setProperty("--y",Math.sin(a)*r+"px");document.body.appendChild(d)}}}function music(n){try{let a=new(AudioContext||webkitAudioContext),t=a.currentTime+.1;n.forEach((f,i)=>{let o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;o.start(t+i*.4);o.stop(t+i*.4+.3)})}catch{}}</script></body></html>
